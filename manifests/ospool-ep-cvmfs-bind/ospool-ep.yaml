apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ospool-ep
    name: ospool-ep
  name: ospool-ep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ospool-ep
  template:
    metadata:
      labels:
        app: ospool-ep
    spec:
      containers:
      - env:
        - name: GLIDEIN_ResourceName
          value: CHTC-DEV-EP-mwestphall
        - name: GLIDEIN_Site
          value: CHTC
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: pool-token
        - name: CONDOR_HOST
          value: test-cm
        - name: GLIDEIN_Start_Extra
          value: 'True'
        - name: OSG_SQUID_LOCATION
          value: 'None'
        - name: OSG_SQUID_LOCATION
          value: 'None'
        - name: ENABLE_REMOTE_SYSLOG
          value: 'False'
        # These overwrite the default values to run startd crons more frequently
        # This is needed to complete tests in a timely manner
        - name: _CONDOR_STARTD_CRON_base_PERIOD
          value: 1m
        - name: _CONDOR_STARTD_CRON_userenv_PERIOD
          value: 1m
        - name: OSG_DEFAULT_CONTAINER_DISTRIBUTION
          value: 100%__htc/minimal:0
        - name: OSG_DEFAULT_CONTAINER_DISTRIBUTION_GPU
          value: 100%__htc/minimal:0
        image: hub.opensciencegrid.org/osg-htc/ospool-ep:25-release
        imagePullPolicy: Always
        name: ospool-ep
        securityContext:
          privileged: true
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
        - mountPath: /pilot
          name: scratch
        - name: cvmfs-singularity
          mountPath: /cvmfs/singularity.opensciencegrid.org
          mountPropagation: Bidirectional
      initContainers:
      - command:
        - chown
        - -R
        - 1000:1000
        - /pilot
        image: hub.opensciencegrid.org/library/alpine:3
        name: chown-pilot-dir
        volumeMounts:
        - mountPath: /pilot
          name: scratch
      volumes:
      - name: cvmfs-singularity
        persistentVolumeClaim:
          claimName: cvmfs-singularity
      - emptyDir:
          sizeLimit: 5Gi
        name: scratch
