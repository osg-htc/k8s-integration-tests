---
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app: registry
spec:
  type: ClusterIP
  selector:
    app: registry
  ports:
    - name: https
      port: 8444
      targetPort: 8444
      protocol: TCP
    - name: xrootd
      port: 8443
      targetPort: 8443
      protocol: TCP
