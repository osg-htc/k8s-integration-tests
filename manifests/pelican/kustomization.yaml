# Kubernetes Kustomization for the Pelican data-federation stack.
# Translated from the upstream docker-compose configuration:
#   https://github.com/brianaydemir/pelicanplatform-test-framework
#
# To apply:
#   kubectl apply -k manifests/pelican/
#
# Secrets are applied separately before deploying — see util/pelican-secrets/.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - common/
  - director/
  - registry/
  - origin/
  - cache/
  - dev/
