---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wait-for-url
data:
  wait-for-url.sh: |
    #!/bin/sh
    set -eu
    IFS=','
    for url in ${WAIT_URLS}; do
      echo "Waiting for ${url} to be ready..."
      until curl -sk "${url}" > /dev/null 2>&1; do
        echo "${url} not ready, retrying in 5s..."
        sleep 5
      done
      echo "${url} is ready."
    done