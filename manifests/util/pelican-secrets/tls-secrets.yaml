---
apiVersion: v1
kind: Secret
metadata:
  name: pelican-certs
type: kubernetes.io/tls
stringData:
  ca.crt: |
    {{ .CaCert | nindent 4 }}
  tls.crt: |
    {{ .TlsCert | nindent 4 }}
  tls.key: |
    {{ .TlsKey | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oidc-client-id
type: Opaque
stringData:
  oidc-client-id: {{ .OidcClientId }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oidc-client-secret
type: Opaque
stringData:
  oidc-client-secret: {{ .OidcClientSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: server-web-passwd
type: Opaque
stringData:
  server-web-passwd: {{ .ServerWebPasswd }}
