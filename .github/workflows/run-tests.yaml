name: Run K8s Integration Tests
on:
  workflow_dispatch: 
jobs:
  test-ospool-ep-cvmfsexec:
    runs-on: ubuntu-22.04
    name: Run OSPool EP test (cvmfsexec)
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: Start minikube
      uses: medyagh/setup-minikube@latest
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - name: 'Test OSPool EP with cvmfsexec'
      run: go test ./test -v -run TestOSPoolEPCvmfsexec -timeout 15m
    - name: 'Upload Test Logs'
      uses: actions/upload-artifact@v4
      with:
        name: ospool-ep-cvmfsexec
        path: /tmp/k8s-tests
        retention-days: 5

      
      
  test-ospool-ep-bind-mount:
    runs-on: ubuntu-22.04
    name: Run OSPool EP tests (cvmfs bind mount)
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: Start minikube
      uses: medyagh/setup-minikube@latest
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - name: 'Test OSPool EP with cvmfs bind mount'
      run: go test ./test -v -run TestOSPoolEPCvmfsBindMount -timeout 15m
    - name: 'Upload Test Logs'
      uses: actions/upload-artifact@v4
      with:
        name: ospool-ep-cvmfs-bind
        path: /tmp/k8s-tests
        retention-days: 5
